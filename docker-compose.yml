services:
  postgres:
    image: postgres:16-alpine
    container_name: gradusy24-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gradusy24
      POSTGRES_USER: gradusy24
      POSTGRES_PASSWORD: gradusy24
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradusy24 -d gradusy24"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
